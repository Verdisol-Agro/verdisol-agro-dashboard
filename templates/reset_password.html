<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-xl font-bold mb-4">Create New Password</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="New password" required class="w-full border p-2 rounded mb-3">
            <button type="submit" class="bg-green-600 text-white w-full py-2 rounded">Reset Password</button>
        </form>
    </div>
</body>
</html>
