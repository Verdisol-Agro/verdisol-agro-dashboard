<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - Verdisol Agro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-xl font-bold mb-4">Reset Your Password</h2>
        {% if message %}
            <div class="bg-green-100 text-green-700 p-2 rounded mb-4">{{ message }}</div>
        {% endif %}
        {% if error %}
            <div class="bg-red-100 text-red-700 p-2 rounded mb-4">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="Your email address" required class="w-full border p-2 rounded mb-3">
            <button type="submit" class="bg-green-600 text-white w-full py-2 rounded">Send Reset Link</button>
        </form>
        <p class="text-center text-sm mt-4"><a href="/login" class="text-blue-600">Back to Login</a></p>
    </div>
</body>
</html>
