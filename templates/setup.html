<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Verdisol Agro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-xl font-bold mb-4">Create Admin Account</h2>
        <p class="text-sm text-gray-600 mb-4">This is the first user. You will be the administrator.</p>
        {% if error %}
            <div class="bg-red-100 text-red-700 p-2 rounded mb-4">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required class="w-full border p-2 rounded mb-3">
            <input type="email" name="email" placeholder="Email" required class="w-full border p-2 rounded mb-3">
            <input type="password" name="password" placeholder="Password" required class="w-full border p-2 rounded mb-3">
            <button type="submit" class="bg-green-600 text-white w-full py-2 rounded">Create Admin</button>
        </form>
    </div>
</body>
</html>
